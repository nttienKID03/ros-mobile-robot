ekf_filter_node:
  frequency: 50  # Tăng tần số cập nhật
  two_d_mode: true  # Robot di chuyển trên mặt phẳng
  map_frame: map
  odom_frame: odom
  base_link_frame: base_footprint
  world_frame: map  # Nếu muốn dùng absolute map thì đặt là "map"

  odom0: odom
  odom0_config: [true, true, false,  # x, y, z
                 false, false, true, # roll, pitch, yaw
                 true, true, false,  # vx, vy, vz
                 false, false, true, # vroll, vpitch, vyaw
                 false, false, false] # ax, ay, az

  imu0: imu/data
  imu0_config: [false, false, false,
                true, true, true,  # roll, pitch, yaw từ IMU
                false, false, false,
                true, true, true,  # gyro data
                false, false, false]
  imu0_differential: true
