DWAPlannerROS:
  max_vel_x: 0.15  # Giới hạn tốc độ di chuyển tới (m/s)
  min_vel_x: 0.0  

  max_vel_theta: 5.0 # Giới hạn tốc độ quay (rad/s)
  min_vel_theta: 0.0

  acc_lim_x: 0.08  # Giảm gia tốc để robot không tăng tốc quá nhanh
  acc_lim_theta: 13

  sim_time: 2.0

  path_distance_bias: 64.0  # Giúp robot bám sát đường đi hơn
  goal_distance_bias: 50.0  
